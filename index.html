<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sapo no lago</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene weather-clear day" id="scene" aria-label="Sapo num nenúfar num lago">
    <div class="sky"></div>
    <div class="sun-moon" id="sunMoon"></div>

    <div class="clouds" id="clouds">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="cloud cloud-c"></span>
    </div>

    <div class="fog" id="fog">
      <span></span><span></span><span></span>
    </div>

    <div class="rain" id="rain"></div>
    <div class="snow" id="snow"></div>
    <div class="lightning" id="lightning"></div>

    <div class="field field-back"></div>

    <div class="lake">
      <div class="ripples ripple-1"></div>
      <div class="ripples ripple-2"></div>
      <div class="ripples ripple-3"></div>
      <div class="ripples ripple-4"></div>
    
      <div class="lake-pad lake-pad-1"></div>
      <div class="lake-pad lake-pad-2"></div>
      <div class="lake-pad lake-pad-3"></div>
      <div class="lake-pad lake-pad-4"></div>
      <div class="lake-pad lake-pad-5"></div>
    </div>
    
    <div class="field field-front"></div>
    
    <div class="lilypad"></div>

    <section class="frog-zone" id="frogZone">
      <div class="tongue" id="tongue"></div>
      <img src="frog.png" alt="Sapo" class="frog" id="frog" />
    </section>

    <img src="fly.png" alt="Mosca" class="fly" id="fly" />
  </main>

  <script src="script.js"></script>
</body>
</html>
